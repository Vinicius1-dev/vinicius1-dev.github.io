<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Project Cover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .cover-image {
            width: 400px;
            height: 280px;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 50%, #1e293b 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.9),
                0 0 100px rgba(59, 130, 246, 0.3),
                inset 0 0 40px rgba(59, 130, 246, 0.1);
        }

        .neon-border {
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa, #3b82f6, #60a5fa);
            border-radius: 16px;
            opacity: 0.6;
            z-index: -1;
            animation: neon-pulse 4s ease-in-out infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .gaming-scene {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-screen {
            width: 200px;
            height: 140px;
            background: #000;
            border: 3px solid #3b82f6;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 40px rgba(59, 130, 246, 0.8),
                inset 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .pixel-grid {
            position: absolute;
            inset: 4px;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(14, 1fr);
            gap: 1px;
        }

        .pixel {
            background: rgba(59, 130, 246, 0.1);
            border-radius: 1px;
        }

        .snake-pixel {
            background: linear-gradient(45deg, #60a5fa, #3b82f6);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.9);
            animation: glow-blue 2s infinite;
        }

        @keyframes glow-blue {
            0%, 100% { opacity: 0.9; box-shadow: 0 0 8px rgba(96, 165, 250, 0.9); }
            50% { opacity: 1; box-shadow: 0 0 12px rgba(96, 165, 250, 1); }
        }

        .food-pixel {
            background: radial-gradient(circle, #fbbf24, #f59e0b);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.9);
            animation: pulse-food 1.5s infinite;
        }

        @keyframes pulse-food {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        .controller {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 80px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 15px;
            box-shadow: 
                0 0 30px rgba(59, 130, 246, 0.8),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            transform: rotate(-12deg);
            animation: float-controller 4s ease-in-out infinite;
        }

        @keyframes float-controller {
            0%, 100% { transform: rotate(-12deg) translateY(0); }
            50% { transform: rotate(-12deg) translateY(-8px); }
        }

        .controller::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .controller::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            opacity: 0.8;
            animation: particle-float 6s infinite ease-in-out;
        }

        @keyframes particle-float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.8; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 1; }
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            opacity: 0.5;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(96, 165, 250, 0.8) 50%, 
                transparent 100%);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-2px); }
            100% { transform: translateY(282px); }
        }
    </style>
</head>
<body>
    <div class="cover-image">
        <div class="neon-border"></div>
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
        <div class="particles">
            <div class="particle" style="top: 15%; left: 20%; animation-delay: 0s;"></div>
            <div class="particle" style="top: 25%; left: 80%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 70%; left: 15%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 85%; left: 75%; animation-delay: 3s;"></div>
            <div class="particle" style="top: 40%; left: 90%; animation-delay: 4s;"></div>
            <div class="particle" style="top: 95%; left: 30%; animation-delay: 5s;"></div>
        </div>

        <div class="gaming-scene">
            <div class="controller"></div>
            
            <div class="game-screen">
                <div class="pixel-grid">
                    <!-- Snake pixels -->
                    <div class="pixel snake-pixel" style="grid-column: 7; grid-row: 7;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 8; grid-row: 7;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 9; grid-row: 7;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 10; grid-row: 7;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 11; grid-row: 7;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 11; grid-row: 8;"></div>
                    <div class="pixel snake-pixel" style="grid-column: 11; grid-row: 9;"></div>
                    
                    <!-- Food pixel -->
                    <div class="pixel food-pixel" style="grid-column: 4; grid-row: 4;"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
