<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Project Cover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .cover-image {
            width: 400px;
            height: 280px;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0d2e 50%, #2d1b69 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.9),
                0 0 100px rgba(147, 51, 234, 0.3),
                inset 0 0 40px rgba(147, 51, 234, 0.1);
        }

        .neon-border {
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, #9333ea, #a855f7, #9333ea, #a855f7);
            border-radius: 16px;
            opacity: 0.6;
            z-index: -1;
            animation: neon-pulse 4s ease-in-out infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .data-scene {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 320px;
            height: 200px;
            background: #000;
            border: 3px solid #9333ea;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 
                0 0 40px rgba(147, 51, 234, 0.7),
                inset 0 0 20px rgba(147, 51, 234, 0.15);
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, 
                rgba(147, 51, 234, 0.1) 0%, 
                transparent 50%, 
                rgba(168, 85, 247, 0.05) 100%);
            pointer-events: none;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: 100%;
        }

        .chart {
            background: rgba(147, 51, 234, 0.08);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 8px;
            padding: 8px;
            position: relative;
            overflow: hidden;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            height: 100%;
            gap: 3px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #a855f7, #9333ea);
            border-radius: 2px 2px 0 0;
            animation: grow-bar 1.5s ease-out forwards;
            box-shadow: 0 0 8px rgba(147, 51, 234, 0.6);
        }

        @keyframes grow-bar {
            0% { height: 0; }
            100% { height: var(--height); }
        }

        .line-chart {
            position: relative;
            height: 100%;
        }

        .chart-line {
            position: absolute;
            bottom: 20%;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, #a855f7, #ec4899, #a855f7);
            animation: draw-line 2s ease-out forwards;
            box-shadow: 0 0 12px rgba(147, 51, 234, 0.8);
        }

        @keyframes draw-line {
            0% { width: 0; }
            100% { width: 80%; }
        }

        .pie-chart {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: conic-gradient(
                #a855f7 0deg 120deg,
                #9333ea 120deg 240deg,
                #ec4899 240deg 360deg
            );
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate-pie 3s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.8);
        }

        @keyframes rotate-pie {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
        }

        .data-points {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .data-point {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ec4899;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.9);
            animation: twinkle-point 2s infinite;
        }

        @keyframes twinkle-point {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .chart-icon {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #9333ea, #a855f7);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 35px rgba(147, 51, 234, 0.7);
            animation: float-icon 4s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }

        .chart-icon::before {
            content: "";
            width: 40px;
            height: 40px;
            background: 
                linear-gradient(45deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%),
                linear-gradient(-45deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-repeat: no-repeat;
            transform: rotate(45deg);
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #a855f7;
            border-radius: 50%;
            opacity: 0.9;
            animation: particle-float 8s infinite ease-in-out;
        }

        @keyframes particle-float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.9; }
            50% { transform: translateY(-25px) translateX(15px); opacity: 1; }
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(147, 51, 234, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 51, 234, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            opacity: 0.5;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 2px solid rgba(147, 51, 234, 0.5);
            border-radius: 50%;
            animation: pulse-expand 3s infinite;
        }

        @keyframes pulse-expand {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="cover-image">
        <div class="neon-border"></div>
        <div class="grid-overlay"></div>
        <div class="particles">
            <div class="particle" style="top: 15%; left: 20%; animation-delay: 0s;"></div>
            <div class="particle" style="top: 25%; left: 85%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 70%; left: 15%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 85%; left: 80%; animation-delay: 3s;"></div>
            <div class="particle" style="top: 40%; left: 95%; animation-delay: 4s;"></div>
            <div class="particle" style="top: 95%; left: 30%; animation-delay: 5s;"></div>
        </div>

        <div class="data-scene">
            <div class="chart-icon"></div>
            
            <div class="dashboard">
                <div class="charts-container">
                    <!-- Bar Chart -->
                    <div class="chart">
                        <div class="bar-chart">
                            <div class="bar" style="--height: 45%; animation-delay: 0.1s;"></div>
                            <div class="bar" style="--height: 70%; animation-delay: 0.2s;"></div>
                            <div class="bar" style="--height: 55%; animation-delay: 0.3s;"></div>
                            <div class="bar" style="--height: 85%; animation-delay: 0.4s;"></div>
                            <div class="bar" style="--height: 60%; animation-delay: 0.5s;"></div>
                        </div>
                    </div>

                    <!-- Line Chart -->
                    <div class="chart">
                        <div class="line-chart">
                            <div class="chart-line"></div>
                            <div class="data-points">
                                <div class="data-point" style="top: 30%; left: 20%; animation-delay: 0s;"></div>
                                <div class="data-point" style="top: 50%; left: 40%; animation-delay: 0.5s;"></div>
                                <div class="data-point" style="top: 25%; left: 60%; animation-delay: 1s;"></div>
                                <div class="data-point" style="top: 60%; left: 80%; animation-delay: 1.5s;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Pie Chart -->
                    <div class="chart">
                        <div class="pie-chart"></div>
                        <div class="pulse-ring"></div>
                    </div>

                    <!-- Mixed Chart -->
                    <div class="chart">
                        <div class="bar-chart">
                            <div class="bar" style="--height: 65%; animation-delay: 0.1s;"></div>
                            <div class="bar" style="--height: 40%; animation-delay: 0.2s;"></div>
                            <div class="bar" style="--height: 80%; animation-delay: 0.3s;"></div>
                            <div class="bar" style="--height: 50%; animation-delay: 0.4s;"></div>
                            <div class="bar" style="--height: 75%; animation-delay: 0.5s;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
