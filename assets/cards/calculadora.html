<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
        }

        .calculator-container {
            width: 400px;
            height: 280px;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.9),
                0 0 100px rgba(59, 130, 246, 0.4),
                inset 0 0 40px rgba(59, 130, 246, 0.15);
        }

        .neon-border {
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa, #3b82f6, #60a5fa);
            border-radius: 20px;
            opacity: 0.8;
            z-index: -1;
            animation: neon-glow 3s ease-in-out infinite;
        }

        @keyframes neon-glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .calculator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 220px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            border: 2px solid #3b82f6;
            box-shadow: 
                0 0 40px rgba(59, 130, 246, 0.6),
                inset 0 0 20px rgba(59, 130, 246, 0.15);
            padding: 15px;
        }

        .display {
            width: 100%;
            height: 50px;
            background: #000;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            color: #60a5fa;
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn {
            width: 100%;
            height: 35px;
            background: linear-gradient(135deg, #1e3a5f, #1e40af);
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #60a5fa;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.operator {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: #93c5fd;
        }

        .btn.equals {
            background: linear-gradient(135deg, #059669, #10b981);
            border-color: #10b981;
            color: #86efac;
            grid-column: span 2;
        }

        .btn.clear {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            border-color: #ef4444;
            color: #fca5a5;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            opacity: 0.5;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #60a5fa;
            border-radius: 50%;
            opacity: 0.9;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-25px) translateX(15px); }
            50% { transform: translateY(15px) translateX(-15px); }
            75% { transform: translateY(-15px) translateX(25px); }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="neon-border"></div>
        <div class="grid-overlay"></div>
        <div class="particles">
            <div class="particle" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
            <div class="particle" style="top: 20%; left: 85%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 65%; left: 10%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 85%; left: 75%; animation-delay: 3s;"></div>
            <div class="particle" style="top: 35%; left: 95%; animation-delay: 4s;"></div>
            <div class="particle" style="top: 95%; left: 25%; animation-delay: 5s;"></div>
        </div>

        <div class="calculator">
            <div class="display">12.457</div>
            <div class="buttons">
                <button class="btn clear">C</button>
                <button class="btn">MC</button>
                <button class="btn">M+</button>
                <button class="btn operator">%</button>
                
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn operator">÷</button>
                
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn operator">×</button>
                
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn operator">-</button>
                
                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn equals">=</button>
                <button class="btn operator">+</button>
            </div>
        </div>
    </div>
</body>
</html>
